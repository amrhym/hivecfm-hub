trigger:
  branches:
    include:
      - main

pool:
  name: hivecfm-build

variables:
  dockerRegistryServiceConnection: hivecfm-acr
  containerRegistry: hivecfmregistry.azurecr.io
  tag: $(Build.BuildId)
  DOCKER_BUILDKIT: 1

stages:
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildHub
    displayName: Build hivecfm-hub
    steps:
    - task: Docker@2
      displayName: Build and push hivecfm-hub
      inputs:
        command: buildAndPush
        repository: hivecfm-hub
        dockerfile: Dockerfile
        buildContext: $(Build.SourcesDirectory)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
